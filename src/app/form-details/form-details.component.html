<div class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-2xl">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
        Form Details
      </h2>
  
      <table class="min-w-full text-left border rounded-lg overflow-hidden">
        <tbody>
          <tr class="border-b">
            <th class="bg-gray-100 px-4 py-3 text-gray-700 w-1/3">Name</th>
            <td class="px-4 py-3">{{ form?.name }}</td>
          </tr>
          <tr class="border-b">
            <th class="bg-gray-100 px-4 py-3 text-gray-700">Email</th>
            <td class="px-4 py-3">{{ form?.email }}</td>
          </tr>
          <tr class="border-b">
            <th class="bg-gray-100 px-4 py-3 text-gray-700">Message</th>
            <td class="px-4 py-3">{{ form?.message }}</td>
          </tr>
          <tr *ngIf="form?._id" class="border-b">
            <th class="bg-gray-100 px-4 py-3 text-gray-700">Form ID</th>
            <td class="px-4 py-3 text-sm text-gray-600">{{ form._id }}</td>
          </tr>
        </tbody>
      </table>
  
      <div class="mt-6 text-center">
        <a
          routerLink="/form"
          class="inline-block bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md transition"
        >
          Back to Forms List
        </a>
      </div>
    </div>
  </div>
