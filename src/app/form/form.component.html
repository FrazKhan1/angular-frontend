<div class="min-h-screen bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto space-y-8">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full">
      <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">
        {{ title }}
      </h1>

      <form
        class="space-y-4"
        (submit)="
          submitForm(
            $event,
            nameField.value,
            emailField.value,
            messageField.value
          )
        "
      >
        <input
          type="text"
          #nameField
          placeholder="Enter your name"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <input
          type="text"
          #emailField
          placeholder="Enter your email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <input
          type="text"
          #messageField
          placeholder="Enter your message"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
        >
          Submit
        </button>
      </form>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-md">
      <h2 class="text-2xl font-semibold mb-4 text-gray-700 text-center">
        Submitted Forms
      </h2>
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm text-gray-700">
          <thead class="bg-blue-100 text-blue-800">
            <tr>
              <th class="text-left py-3 px-4">#</th>
              <th class="text-left py-3 px-4">Name</th>
              <th class="text-left py-3 px-4">Email</th>
              <th class="text-left py-3 px-4">Message</th>
              <th class="text-left py-3 px-4">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr
              *ngFor="let form of forms; let i = index"
              class="border-t hover:bg-gray-50 transition"
            >
              <td class="py-2 px-4">{{ i + 1 }}</td>
              <td class="py-2 px-4">{{ form.name }}</td>
              <td class="py-2 px-4">{{ form.email }}</td>
              <td class="py-2 px-4">{{ form.message }}</td>
              <td class="py-2 px-4">
                <button
                  class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-md"
                  [routerLink]="['/form', form._id]"
                >
                  View
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <!-- Loader Overlay -->
  <div
    *ngIf="isLoading"
    class="fixed inset-0 bg-black/50 bg-opacity-50 z-50 flex items-center justify-center"
  >
    <div
      class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"
    ></div>
  </div>
</div>
