<form [formGroup]="testForm" (ngSubmit)="submitForm()" class="max-w-lg mx-auto p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-semibold text-center mb-6 text-gray-700">Contact Form</h2>
    
    <!-- Name Field -->
    <div class="mb-4">
      <label for="name" class="block text-sm font-medium text-gray-600">Name</label>
      <input
        type="text"
        id="name"
        formControlName="name"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Enter your name"
      />
    </div>
  
    <div class="mb-4">
      <label for="email" class="block text-sm font-medium text-gray-600">Email</label>
      <input
        type="text"
        id="email"
        formControlName="email"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Enter your email"
      />
    </div>
  
    <div class="mb-6">
      <label for="message" class="block text-sm font-medium text-gray-600">Message</label>
      <input
        type="text"
        id="message"
        formControlName="message"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Enter your message"
      />
    </div>
  
    <button
      type="submit"
      class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
      [disabled]="!testForm.valid"
    >
      Submit
    </button>
  </form>
